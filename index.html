<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bestie ❤️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap');
  body {margin: 0;font-family: 'Poppins', sans-serif;background: linear-gradient(135deg, #ff9a9e, #fecfef);display: flex;justify-content: center;align-items: center;min-height: 100vh;padding: 20px;overflow: hidden;}
  .container {background: white;padding: 30px 20px;border-radius: 25px;box-shadow: 0 10px 30px rgba(0,0,0,0.2);text-align: center;width: 90%;max-width: 400px;}
  h1 { font-family: 'Great Vibes', cursive;color: #ff4d88; font-size: 30px;margin: 10px 0;}
  .msg { font-size: 16px; color: #444; margin: 20px 0; line-height: 1.8; }
  input {padding: 12px;border: 2px solid #ff4d88;border-radius: 12px;width: 80%;font-size: 16px;text-align: center;}
  button {margin-top: 15px;padding: 12px 25px;background: #ff4d88;color: white;border: none;border-radius: 15px;font-size: 16px;font-weight: 600;cursor: pointer;}
  button:hover { background: #e03e75; transform: scale(1.05); }
  .screen { display: none; }
  .active { display: block; animation: fadeIn 0.8s; }
  @keyframes fadeIn { from {opacity:0} to {opacity:1} }
  .birthday-img img {width: 90%;border-radius: 20px;margin: 15px 0;}
  .heart { font-size: 60px; color: red; animation: beat 1s infinite; }
  @keyframes beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  .confetti {position: fixed; top:0; left:0; width:100%; height:100%;pointer-events:none; display:none; z-index:999;}
</style>
</head>
<body>

<canvas class="confetti" id="confetti"></canvas>

<audio id="bgMusic" loop>
  <source src="https://pixeldrain.com/api/file/VqjnQ3SF?download" type="audio/mpeg">
</audio>

<div class="container">
  <div class="screen active" id="screen1">
    <h1>🔒 Enter Password</h1>
    <input type="password" id="password" placeholder="Enter Password">
    <br><button onclick="checkPassword()">Open</button>
    <p id="error" style="color:red; display:none;">Wrong Password!</p>
  </div>

  <!-- یہاں 2 سے 24 تک والے سارے پیجز ہیں -->
  <div class="screen" id="screen2"><h1>Hey Bestie! 👋</h1><p class="msg">Aaj ka din bohot special hai...<br>Kyun? Chalo batati hun ❤️</p><button onclick="nextScreen(3)">Next</button></div>
  
  <!-- ... درمیان کے سارے 23 پیجز ویسے ہی رہیں گے ... -->

  <!-- آخری پیج - یہاں آپ کی pic لگ گئی -->
  <div class="screen" id="screen25">
    <h1>Happy Birthday Bestie! 🎂</h1>
    <div class="birthday-img">
      <img src="https://pixeldrain.com/api/file/sV3X3b2m?download" alt="Birthday Photo">
    </div>
    <p class="msg">I Love You ❤️<br>Tu mere liye sabse khaas hai!</p>
    <div class="heart">❤️</div>
  </div>
</div>

<script>
  const correctPass = "0110"; 
  const music = document.getElementById("bgMusic");

  function checkPassword() {
    let pass = document.getElementById("password").value;
    if(pass === correctPass) {
      showConfetti();
      setTimeout(() => nextScreen(2), 800);
      music.play().catch(() => {});
    } else {
      document.getElementById("error").style.display = "block";
    }
  }
  function nextScreen(n) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("screen" + n).classList.add("active");
    if(n === 25) {
      setTimeout(() => { music.pause(); }, 5000);
    }
  }
  function showConfetti() {
    const canvas = document.getElementById('confetti');
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let pieces = [];
    for(let i=0; i<150; i++){pieces.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height-100, r:Math.random()*4+1})}
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p=>{ctx.beginPath();ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;ctx.fill();p.y += 3;})
    }
    let anim = setInterval(draw, 20);
    setTimeout(()=>{clearInterval(anim); canvas.style.display='none'}, 4000);
  }
</script>

</body>
</html>
