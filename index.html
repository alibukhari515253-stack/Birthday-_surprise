<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 👑</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');
  *{box-sizing: border-box;}
  body {margin: 0;font-family: 'Poppins', sans-serif;background: linear-gradient(135deg, #667eea, #764ba2);display: flex;justify-content: center;align-items: center;min-height: 100vh;padding: 20px;}
  .container {background: white;padding: 35px 25px;border-radius: 30px;box-shadow: 0 15px 40px rgba(0,0,0,0.3);text-align: center;width: 90%;max-width: 420px;}
  h1 { font-family: 'Dancing Script', cursive;color: #764ba2; font-size: 34px;margin: 10px 0;}
  .msg { font-size: 17px; color: #333; margin: 20px 0; line-height: 1.9; }
  .shayari { font-style: italic; color: #764ba2; font-weight: 600; }
  input {padding: 14px;border: 2px solid #764ba2;border-radius: 15px;width: 80%;font-size: 16px;text-align: center;outline:none;}
  button {margin-top: 18px;padding: 14px 30px;background: linear-gradient(135deg, #667eea, #764ba2);color: white;border: none;border-radius: 20px;font-size: 17px;font-weight: 600;cursor: pointer;transition:0.3s;}
  button:active { transform: scale(0.95); }
  .screen { display: none; }
  .active { display: block; animation: fadeIn 0.9s; }
  @keyframes fadeIn { from {opacity:0; transform:scale(0.9)} to {opacity:1; transform:scale(1)} }
  .birthday-img img {width: 90%;border-radius: 25px;margin: 15px 0; box-shadow:0 8px 20px rgba(0,0,0,0.2);}
  .crown { font-size: 50px; animation: float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .confetti {position: fixed; top:0; left:0; width:100%; height:100%;pointer-events:none; display:none; z-index:999;}
</style>
</head>
<body>

<canvas class="confetti" id="confetti"></canvas>

<audio id="bgMusic" loop>
  <source src="https://pixeldrain.com/api/file/VqjnQ3SF?download" type="audio/mpeg">
</audio>

<div class="container">
  <div class="screen active" id="screen1">
    <h1>🔐 Secret Message</h1>
    <p class="msg">Ye sirf tere liye hai...<br>Password daal ke kholo</p>
    <input type="password" id="password" placeholder="Enter Password">
    <br><button onclick="checkPassword()">Unlock</button>
    <p id="error" style="color:red; display:none;margin-top:10px;">Galat Password!</p>
  </div>

  <!-- 2 سے 30 تک سارے pages ویسے ہی ہیں -->
  <div class="screen" id="screen2"><div class="crown">👑</div><h1>Aaj ka Din</h1><p class="msg">Aaj ek khas insan ka janam din hai.<br>Wo insan... <b>TUM</b> ho ❤️</p><button onclick="nextScreen(3)">Aage</button></div>
  <!-- ... درمیان والے 28 pages ... -->
  <div class="screen" id="screen30">
    <h1>Happy Birthday! 🎂</h1>
    <div class="birthday-img">
      <img src="https://i.ibb.co/C3GQwrtN/photo.jpg" alt="Birthday Photo">
    </div>
    <p class="msg shayari">I Love You ❤️<br>Tum sabse khaas ho mere liye!</p>
    <div class="crown">👑</div>
  </div>
</div>

<script>
  const correctPass = "0113"; // <-- Password change kar diya
  const music = document.getElementById("bgMusic");

  function checkPassword() {
    let pass = document.getElementById("password").value;
    if(pass === correctPass) {
      showConfetti();
      setTimeout(() => nextScreen(2), 900);
      music.play().catch(() => {});
    } else {
      document.getElementById("error").style.display = "block";
    }
  }
  function nextScreen(n) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("screen" + n).classList.add("active");
    if(n === 30) {
      setTimeout(() => { music.pause(); }, 6000);
    }
  }
  function showConfetti() {
    const canvas = document.getElementById('confetti');
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let pieces = [];
    for(let i=0; i<200; i++){pieces.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height-100, r:Math.random()*5+2})}
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p=>{ctx.beginPath();ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);ctx.fillStyle = `hsl(${Math.random()*360},100%,60%)`;ctx.fill();p.y += 4;})
    }
    let anim = setInterval(draw, 20);
    setTimeout(()=>{clearInterval(anim); canvas.style.display='none'}, 5000);
  }
</script>

</body>
</html>
